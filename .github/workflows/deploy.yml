name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            # Navigate to the project directory
            cd /home/${{ secrets.EC2_USERNAME }}/compliance-check
            
            # Pull the latest changes
            git pull origin main
            
            # Navigate to the Next.js app directory
            cd compliance-nextjs
            
            # Install dependencies (quietly)
            npm ci --quiet
            
            # Build the project (Next.js loads .env.production automatically)
            npm run build
            
            # Restart the app with PM2, or start it if it's not running
            pm2 restart compliance-app 
            